<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Gyan V8 Pro Max Generator</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .generator-wrap{max-width:1200px;margin:20px auto;padding:20px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
        .grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
        .card{background:var(--card-bg,#fff);padding:20px;border-radius:12px;border:1px solid var(--border,#e2e8f0);margin-bottom:20px}
        .card-title{font-size:1.2rem;font-weight:700;margin-bottom:16px;color:var(--accent,#1a3a5c)}
        .field{margin-bottom:12px}
        .field label{display:block;font-size:0.9rem;font-weight:600;margin-bottom:6px}
        .field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid var(--border,#e2e8f0);border-radius:8px;background:var(--bg,#f8fafc)}
        .field textarea{min-height:100px}
        .req{color:#dc2626}
        .btn{background:#1a3a5c;color:#fff;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-right:10px}
        .btn-secondary{background:#64748b}
        .btn-outline{background:transparent;border:2px solid #1a3a5c;color:#1a3a5c}
        .output-section{display:none;margin-top:20px}
        .code-block{background:#0f172a;color:#e2e8f0;padding:20px;border-radius:12px;overflow:auto;max-height:500px;font-size:0.8rem;white-space:pre-wrap}
        @media(max-width:768px){.grid-2,.grid-3,.grid-5{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="generator-wrap">
        <h1>🚀 Mission Gyan V8 Pro Max - Job Page Generator</h1>
        <p>Ye tool MissionGyanJobs ke common.js + style.css ke liye optimized hai</p>

        <div class="card">
            <div class="card-title">📋 Basic Details</div>
            <div class="grid-2">
                <div class="field">
                    <label>Vacancy Title <span class="req">*</span></label>
                    <input type="text" id="title" placeholder="UPSC Civil Services IAS 2026">
                </div>
                <div class="field">
                    <label>File Name <span class="req">*</span></label>
                    <input type="text" id="filename" placeholder="upsc-civil-services-2026">
                </div>
                <div class="field">
                    <label>Organization <span class="req">*</span></label>
                    <input type="text" id="org" placeholder="Union Public Service Commission">
                </div>
                <div class="field">
                    <label>Post Name <span class="req">*</span></label>
                    <input type="text" id="post" placeholder="IAS / IFS">
                </div>
                <div class="field">
                    <label>Total Vacancies <span class="req">*</span></label>
                    <input type="text" id="total" placeholder="1013">
                </div>
                <div class="field">
                    <label>Last Date <span class="req">*</span></label>
                    <input type="text" id="lastDate" placeholder="27/02/2026">
                </div>
                <div class="field">
                    <label>Qualification <span class="req">*</span></label>
                    <input type="text" id="qualification" placeholder="Bachelor's Degree">
                </div>
                <div class="field">
                    <label>Payment Mode</label>
                    <input type="text" id="paymentMode" placeholder="Online">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📅 Important Dates</div>
            <div class="grid-5">
                <div class="field"><label>Apply Start</label><input type="text" id="startDate" placeholder="04/02/2026"></div>
                <div class="field"><label>Exam Date</label><input type="text" id="examDate" placeholder="24/05/2026"></div>
                <div class="field"><label>Admit Card</label><input type="text" id="admitDate" placeholder="15/05/2026"></div>
                <div class="field"><label>Result Date</label><input type="text" id="resultDate" placeholder="10/07/2026"></div>
                <div class="field"><label>State</label><input type="text" id="state" placeholder="All India"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">💰 Fee Details</div>
            <div class="grid-3">
                <div class="field"><label>General</label><input type="text" id="feeGen" placeholder="₹ 100"></div>
                <div class="field"><label>OBC</label><input type="text" id="feeOBC" placeholder="₹ 100"></div>
                <div class="field"><label>EWS</label><input type="text" id="feeEWS" placeholder="₹ 100"></div>
                <div class="field"><label>SC</label><input type="text" id="feeSC" placeholder="₹ 50"></div>
                <div class="field"><label>ST</label><input type="text" id="feeST" placeholder="₹ 50"></div>
                <div class="field"><label>Female</label><input type="text" id="feeFemale" placeholder="₹ 0"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🎂 Age & Other Details</div>
            <div class="grid-3">
                <div class="field"><label>Min Age</label><input type="text" id="minAge" placeholder="21 Years"></div>
                <div class="field"><label>Max Age</label><input type="text" id="maxAge" placeholder="32 Years"></div>
                <div class="field"><label>Age Relaxation</label><input type="text" id="ageRelax" placeholder="SC/ST 5 yrs"></div>
                <div class="field"><label>Location</label><input type="text" id="location" placeholder="New Delhi"></div>
                <div class="field"><label>Experience</label><input type="text" id="experience" placeholder="Fresher"></div>
                <div class="field"><label>Preferred Qual.</label><input type="text" id="prefQualification" placeholder="Master's Degree"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📝 Content Sections</div>
            <div class="field"><label>Short Description <span class="req">*</span></label><textarea id="shortInfo" placeholder="UPSC has released notification..."></textarea></div>
            <div class="field"><label>Vacancy Table: Category | Total | Eligibility</label><textarea id="vacancyTable" placeholder="General | 500 | Bachelor's Degree"></textarea></div>
            <div class="field"><label>Selection Process: one per line</label><textarea id="selectionProcess" placeholder="Preliminary Exam"></textarea></div>
            <div class="field"><label>How to Apply: one per line</label><textarea id="howToApply" placeholder="1. Visit official website"></textarea></div>
            <div class="field"><label>Important Instructions</label><textarea id="impInstructions" placeholder="Read notification carefully"></textarea></div>
            <div class="field"><label>FAQ: Question ? Answer</label><textarea id="faq" placeholder="What is last date ? 27th Feb 2026"></textarea></div>
            <div class="field"><label>Related Jobs: Job Title | URL</label><textarea id="relatedJobs" placeholder="SSC CGL 2026 | https://ssc.nic.in"></textarea></div>
        </div>

        <div class="card">
            <div class="card-title">🔗 Important Links</div>
            <div class="grid-3">
                <div class="field"><label>Notification PDF</label><input type="url" id="notifLink" placeholder="https://upsc.gov.in/notification.pdf"></div>
                <div class="field"><label>Apply Online</label><input type="url" id="applyLink" placeholder="https://upsconline.nic.in"></div>
                <div class="field"><label>Official Website</label><input type="url" id="webLink" placeholder="https://upsc.gov.in"></div>
            </div>
        </div>

        <button class="btn" onclick="generateVacancy()">🚀 Generate Pro Max HTML</button>
        <button class="btn btn-secondary" onclick="copyHTML()">📋 Copy HTML</button>
        <button class="btn btn-outline" onclick="downloadHTML()">⬇️ Download .html</button>

        <div class="output-section" id="outputSection">
            <div class="card">
                <div class="card-title">✅ Generated HTML - Ready for MissionGyanJobs</div>
                <div class="code-block" id="codeBlock"></div>
            </div>
        </div>
    </div>

<script>
const $ = id => document.getElementById(id);

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function generateSlug(text) {
    return text.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

$('title').addEventListener('input', function() {
    if (!$('filename').value) $('filename').value = generateSlug(this.value);
});

function getField(id) { return $(id).value.trim(); }

function generateVacancy() {
    const data = {
        title: getField('title'),
        filename: getField('filename') || generateSlug(getField('title')),
        org: getField('org'),
        post: getField('post'),
        total: getField('total'),
        lastDate: getField('lastDate'),
        qualification: getField('qualification'),
        paymentMode: getField('paymentMode'),
        startDate: getField('startDate'),
        examDate: getField('examDate'),
        admitDate: getField('admitDate'),
        resultDate: getField('resultDate'),
        state: getField('state'),
        location: getField('location'),
        feeGen: getField('feeGen'),
        feeOBC: getField('feeOBC'),
        feeEWS: getField('feeEWS'),
        feeSC: getField('feeSC'),
        feeST: getField('feeST'),
        feeFemale: getField('feeFemale'),
        minAge: getField('minAge'),
        maxAge: getField('maxAge'),
        ageRelax: getField('ageRelax'),
        prefQualification: getField('prefQualification'),
        experience: getField('experience'),
        shortInfo: getField('shortInfo'),
        vacancyTable: getField('vacancyTable'),
        selectionProcess: getField('selectionProcess'),
        howToApply: getField('howToApply'),
        impInstructions: getField('impInstructions'),
        faq: getField('faq'),
        relatedJobs: getField('relatedJobs'),
        notifLink: getField('notifLink'),
        applyLink: getField('applyLink'),
        webLink: getField('webLink')
    };

    // Validation
    if (!data.title || !data.org || !data.post || !data.total || !data.lastDate || !data.qualification || !data.shortInfo) {
        alert('⚠️ Please fill all required fields marked with *');
        return;
    }

    // Build tables
    let vacancyRows = '';
    if (data.vacancyTable) {
        data.vacancyTable.split('\n').filter(l => l.trim()).forEach(line => {
            const parts = line.split('|').map(s => s.trim());
            if (parts.length >= 2) vacancyRows += `<tr><td>${escHtml(parts[0])}</td><td>${escHtml(parts[1]||'-')}</td><td>${escHtml(parts[2]||'-')}</td></tr>`;
        });
    }
    const vacancyHTML = vacancyRows ? `<div class="table-wrap"><table><thead><tr><th>Category</th><th>Total</th><th>Eligibility</th></tr></thead><tbody>${vacancyRows}</tbody></table></div>` : '<p>No category-wise details provided.</p>';

    let selectionHTML = data.selectionProcess ? '<ol>' + data.selectionProcess.split('\n').filter(s=>s.trim()).map(s=>`<li>${escHtml(s.trim())}</li>`).join('') + '</ol>' : '';
    let howToHTML = data.howToApply ? '<ol>' + data.howToApply.split('\n').filter(s=>s.trim()).map(s=>`<li>${escHtml(s.trim())}</li>`).join('') + '</ol>' : '';
    
    let faqHTML = '';
    if (data.faq) {
        data.faq.split('\n').filter(l=>l.trim()).forEach(line => {
            const parts = line.split('?').map(s=>s.trim());
            if (parts.length >= 2) faqHTML += `<div class="faq-item"><strong>Q: ${escHtml(parts[0])}?</strong><p>A: ${escHtml(parts.slice(1).join('?').trim())}</p></div>`;
        });
    }

    let relatedHTML = '';
    if (data.relatedJobs) {
        const items = data.relatedJobs.split('\n').filter(l=>l.trim()).map(line => {
            const parts = line.split('|').map(s=>s.trim());
            return parts.length >= 2 ? `<li><a href="${escHtml(parts[1])}" target="_blank" rel="noopener">${escHtml(parts[0])}</a></li>` : `<li>${escHtml(line)}</li>`;
        });
        if (items.length) relatedHTML = `<ul class="related-list">${items.join('')}</ul>`;
    }

    let linksHTML = '';
    if (data.notifLink) linksHTML += `<li><a href="${escHtml(data.notifLink)}" target="_blank" rel="noopener">📄 Notification</a></li>`;
    if (data.applyLink) linksHTML += `<li><a href="${escHtml(data.applyLink)}" target="_blank" rel="noopener">📝 Apply Online</a></li>`;
    if (data.webLink) linksHTML += `<li><a href="${escHtml(data.webLink)}" target="_blank" rel="noopener">🏢 Official Website</a></li>`;
    linksHTML = `<ul class="important-links">${linksHTML || '<li>No links provided.</li>'}</ul>`;

    const seoTitle = `${data.title} – ${data.post} | ${data.org}`;
    const metaDesc = data.shortInfo.substring(0, 160);
    const canonical = `https://missiongyanjobs.github.io/jobs/${data.filename}.html`;
    const todayISO = new Date().toISOString().split('T')[0];

    // FAQ Schema
    let faqSchema = '';
    if (data.faq) {
        const faqItems = data.faq.split('\n').filter(l=>l.trim()).map(line => {
            const parts = line.split('?').map(s=>s.trim());
            if (parts.length >= 2) return `{"@type":"Question","name":"${escHtml(parts[0])}?","acceptedAnswer":{"@type":"Answer","text":"${escHtml(parts.slice(1).join('?').trim())}"}}`;
            return '';
        }).filter(Boolean).join(',');
        if (faqItems) faqSchema = `<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[${faqItems}]}<\/script>`;
    }

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escHtml(seoTitle)}</title>
    <meta name="description" content="${escHtml(metaDesc)}">
    <meta name="keywords" content="${escHtml(data.post)}, ${escHtml(data.org)}, ${escHtml(data.qualification)}, ${escHtml(data.state)}, Sarkari Naukri">
    <link rel="canonical" href="${escHtml(canonical)}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="${escHtml(seoTitle)}">
    <meta property="og:description" content="${escHtml(metaDesc)}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="${escHtml(canonical)}">
    <link rel="stylesheet" href="../style.css">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "JobPosting",
      "title": "${escHtml(data.title)}",
      "description": "${escHtml(metaDesc)}",
      "datePosted": "${todayISO}",
      "validThrough": "${escHtml(data.lastDate)}",
      "hiringOrganization": {"@type": "Organization","name": "${escHtml(data.org)}"},
      "jobLocation": {"@type": "Place","address": {"@type": "PostalAddress","addressLocality": "${escHtml(data.location || 'India')}","addressRegion": "${escHtml(data.state || 'India')}"}},
      "employmentType": "FULL_TIME",
      "qualifications": "${escHtml(data.qualification)}",
      "totalJobOpenings": "${escHtml(data.total)}"
    }
    <\/script>
    ${faqSchema}
</head>
<body>
    <div id="job-meta" 
         data-qualification="${escHtml(data.qualification)}" 
         data-form-mode="${escHtml(data.paymentMode || 'Online')}" 
         data-post="${escHtml(data.post)}" 
         data-total="${escHtml(data.total)}" 
         data-last-date="${escHtml(data.lastDate)}">
    </div>

    <div class="container" id="job-page">
        <div class="top-bar">
            <h1>${escHtml(data.title)}</h1>
        </div>

        <div class="job-meta-grid">
            <div class="item"><span class="label">Organization</span><span class="value">${escHtml(data.org)}</span></div>
            <div class="item"><span class="label">Post Name</span><span class="value">${escHtml(data.post)}</span></div>
            <div class="item"><span class="label">Total Vacancies</span><span class="value">${escHtml(data.total)}</span></div>
            <div class="item"><span class="label">Location</span><span class="value">${escHtml(data.location || 'India')}</span></div>
            <div class="item"><span class="label">Qualification</span><span class="value">${escHtml(data.qualification)}</span></div>
            <div class="item"><span class="label">Last Date</span><span class="value">${escHtml(data.lastDate)}</span></div>
        </div>

        <div class="section">
            <h2>📌 Short Information</h2>
            <p>${escHtml(data.shortInfo)}</p>
            ${data.impInstructions ? `<div class="section"><h2>📌 Important Instructions</h2><p>${escHtml(data.impInstructions)}</p></div>` : ''}
        </div>

        <div class="section">
            <h2>📅 Important Dates</h2>
            <div class="table-wrap">
                <table>
                    <tr><th>Event</th><th>Date</th></tr>
                    ${data.startDate ? `<tr><td>Apply Start</td><td>${escHtml(data.startDate)}</td></tr>` : ''}
                    <tr><td><strong>Last Date</strong></td><td><strong>${escHtml(data.lastDate)}</strong></td></tr>
                    ${data.examDate ? `<tr><td>Exam Date</td><td>${escHtml(data.examDate)}</td></tr>` : ''}
                    ${data.admitDate ? `<tr><td>Admit Card</td><td>${escHtml(data.admitDate)}</td></tr>` : ''}
                    ${data.resultDate ? `<tr><td>Result Date</td><td>${escHtml(data.resultDate)}</td></tr>` : ''}
                </table>
            </div>
        </div>

        <div class="section">
            <h2>💰 Application Fee</h2>
            <div class="table-wrap">
                <table>
                    <tr><th>Category</th><th>Fee</th></tr>
                    ${data.feeGen ? `<tr><td>General</td><td>${escHtml(data.feeGen)}</td></tr>` : ''}
                    ${data.feeOBC ? `<tr><td>OBC</td><td>${escHtml(data.feeOBC)}</td></tr>` : ''}
                    ${data.feeEWS ? `<tr><td>EWS</td><td>${escHtml(data.feeEWS)}</td></tr>` : ''}
                    ${data.feeSC ? `<tr><td>SC</td><td>${escHtml(data.feeSC)}</td></tr>` : ''}
                    ${data.feeST ? `<tr><td>ST</td><td>${escHtml(data.feeST)}</td></tr>` : ''}
                    ${data.feeFemale ? `<tr><td>Female</td><td>${escHtml(data.feeFemale)}</td></tr>` : ''}
                    ${data.paymentMode ? `<tr><td>Payment Mode</td><td>${escHtml(data.paymentMode)}</td></tr>` : ''}
                </table>
            </div>
        </div>

        <div class="section">
            <h2>🎂 Age Limit</h2>
            <div class="table-wrap">
                <table>
                    <tr><th>Category</th><th>Age</th></tr>
                    ${data.minAge || data.maxAge ? `<tr><td>Min / Max</td><td>${escHtml(data.minAge)} – ${escHtml(data.maxAge)}</td></tr>` : ''}
                    ${data.ageRelax ? `<tr><td>Relaxation</td><td>${escHtml(data.ageRelax)}</td></tr>` : ''}
                </table>
            </div>
        </div>

        <div class="section">
            <h2>🎓 Qualification</h2>
            <div class="table-wrap">
                <table>
                    <tr><th>Minimum</th><td>${escHtml(data.qualification)}</td></tr>
                    ${data.prefQualification ? `<tr><th>Preferred</th><td>${escHtml(data.prefQualification)}</td></tr>` : ''}
